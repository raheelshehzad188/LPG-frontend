<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Property Search - Chat | LPG</title>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
      min-height: 100vh;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    h1 {
      text-align: center;
      color: #1a1a2e;
      margin: 0 0 8px 0;
      font-size: 1.5rem;
    }
    .subtitle {
      text-align: center;
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 16px;
    }
    .chat-section {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 320px;
    }
    .chat-header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      padding: 14px 20px;
      font-weight: 600;
      font-size: 1rem;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      min-height: 200px;
      max-height: 320px;
    }
    .msg {
      margin-bottom: 12px;
      padding: 10px 14px;
      border-radius: 10px;
      max-width: 85%;
      line-height: 1.5;
    }
    .msg.user {
      background: #e8f4fd;
      margin-left: auto;
      margin-right: 0;
      border: 1px solid #b8daff;
    }
    .msg.model {
      background: #f0f0f0;
      margin-right: auto;
      margin-left: 0;
      border: 1px solid #ddd;
    }
    .msg-label {
      font-size: 0.75rem;
      color: #888;
      margin-bottom: 4px;
    }
    .chat-input-area {
      display: flex;
      gap: 10px;
      padding: 12px 16px;
      background: #fafafa;
      border-top: 1px solid #eee;
    }
    .chat-input-area input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
    }
    .chat-input-area input:focus {
      border-color: #1a1a2e;
    }
    .chat-input-area button {
      padding: 12px 24px;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.95rem;
    }
    .chat-input-area button:hover {
      background: #16213e;
    }
    .chat-input-area button:disabled {
      background: #999;
      cursor: not-allowed;
    }
    .typing {
      color: #888;
      font-style: italic;
      padding: 8px 0;
    }
    .props-section {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    .props-header {
      background: #f8f9fa;
      padding: 14px 20px;
      font-weight: 600;
      color: #1a1a2e;
      border-bottom: 1px solid #eee;
    }
    .props-count {
      font-size: 0.85rem;
      color: #666;
      font-weight: normal;
    }
    .props-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      padding: 16px;
    }
    .prop-card {
      background: #fff;
      border: 1px solid #eee;
      border-radius: 10px;
      overflow: hidden;
      transition: box-shadow 0.2s;
    }
    .prop-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }
    .prop-img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      background: #e9ecef;
    }
    .prop-body {
      padding: 12px;
    }
    .prop-title {
      font-weight: 600;
      color: #1a1a2e;
      margin: 0 0 6px 0;
      font-size: 0.95rem;
      line-height: 1.3;
    }
    .prop-location {
      color: #666;
      font-size: 0.85rem;
      margin-bottom: 6px;
    }
    .prop-price {
      font-weight: 700;
      color: #0d6efd;
      font-size: 1.1rem;
    }
    .prop-meta {
      font-size: 0.8rem;
      color: #888;
      margin-top: 6px;
    }
    .empty-props {
      padding: 40px 20px;
      text-align: center;
      color: #888;
    }
    .lead-success {
      background: #d4edda;
      border: 1px solid #28a745;
      color: #155724;
      padding: 12px 16px;
      border-radius: 8px;
      margin: 0 0 16px 0;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 500;
    }
    .lead-success::before {
      content: '✓';
      font-size: 1.2rem;
      font-weight: bold;
      color: #28a745;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Property Search</h1>
    <p class="subtitle">Enter your requirements below to see matching properties</p>

    <div id="leadSuccessBanner" class="lead-success" style="display: none;"></div>

    <div class="chat-section">
      <div class="chat-header">Chat</div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="Enter your search, e.g. DHA Phase 6 plots..." autocomplete="off">
        <button id="sendBtn">Send</button>
      </div>
    </div>

    <div class="props-section">
      <div class="props-header">
        Properties
        <span class="props-count" id="propsCount"></span>
      </div>
      <div class="props-grid" id="propsGrid"></div>
    </div>
  </div>

  <script>
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');
    const propsGrid = document.getElementById('propsGrid');
    const propsCount = document.getElementById('propsCount');
    const leadSuccessBanner = document.getElementById('leadSuccessBanner');

    // api_new_ai.php — Vite proxy /api_new_ai → localhost/propert_paython/api_new_ai.php
    const API_URL = '/api_new_ai';

    let query = '';
    let messages = [];
    let isFirstMessage = true;
    let lastLeadCollected = {};
    let lastFilterCriteria = {};

    function formatPrice(n) {
      if (!n || n < 0) return '—';
      if (n >= 10000000) return (n / 10000000).toFixed(1) + ' Cr';
      if (n >= 100000) return (n / 100000).toFixed(0) + ' Lac';
      return n.toLocaleString();
    }

    function addMsg(role, content) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      const label = role === 'user' ? 'You' : 'Assistant';
      div.innerHTML = '<div class="msg-label">' + escapeHtml(label) + '</div>' + escapeHtml(content);
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.id = 'typingEl';
      div.className = 'typing';
      div.textContent = '...';
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById('typingEl');
      if (el) el.remove();
    }

    function renderProperties(props) {
      propsCount.textContent = props.length ? ' (' + props.length + ' properties)' : '';
      if (!props.length) {
        propsGrid.innerHTML = '<div class="empty-props">No properties yet. Enter your requirements in the chat above.</div>';
        return;
      }
      propsGrid.innerHTML = props.map(function(p) {
        const priceNum = typeof p.price === 'number' ? p.price : (p.priceLac ? p.priceLac * 100000 : null);
        const img = p.cover_photo || p.image || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="120" viewBox="0 0 200 120"><rect fill="%23e9ecef" width="200" height="120"/><text x="50%" y="50%" fill="%23999" text-anchor="middle" dy=".3em" font-size="14">No image</text></svg>';
        const title = (p.title || p.location_name || 'Property').substring(0, 60);
        const loc = p.location_name || p.location || '—';
        const price = typeof p.price === 'string' ? p.price : formatPrice(priceNum);
        const meta = [p.type, p.area_size || p.size].filter(Boolean).join(' • ');
        return '<div class="prop-card">' +
          '<img class="prop-img" src="' + escapeHtml(img) + '" alt="" loading="lazy">' +
          '<div class="prop-body">' +
          '<div class="prop-title">' + escapeHtml(title) + '</div>' +
          '<div class="prop-location">' + escapeHtml(loc) + '</div>' +
          '<div class="prop-price">Rs ' + escapeHtml(price) + '</div>' +
          (meta ? '<div class="prop-meta">' + escapeHtml(meta) + '</div>' : '') +
          '</div></div>';
      }).join('');
    }

    function sendMessage(userText) {
      if (!userText.trim()) return;
      const text = userText.trim();
      chatInput.value = '';

      if (isFirstMessage) {
        query = text;
        messages = [];
        lastLeadCollected = {};
        lastFilterCriteria = {};
        isFirstMessage = false;
      }
      messages.push({ role: 'user', content: text });
      addMsg('user', text);
      sendBtn.disabled = true;
      showTyping();

      const payload = {
        query: query,
        messages: messages.map(function(m) { return { role: m.role === 'assistant' ? 'model' : m.role, content: m.content }; }),
        lead_collected: lastLeadCollected,
        filter_criteria: lastFilterCriteria
      };

      fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify(payload)
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.error) {
          addMsg('model', 'Error: ' + data.error);
          return;
        }
        lastLeadCollected = data.lead_collected || {};
        lastFilterCriteria = data.filter_criteria || {};
        const modelReply = data.question || data.message || '—';
        messages.push({ role: 'model', content: modelReply });
        addMsg('model', modelReply);
        const props = data.properties || data.listings || [];
        renderProperties(props);
        if (data.lead_saved && data.lead_id) {
          leadSuccessBanner.textContent = 'Lead saved! ID: ' + data.lead_id + ' — Check in database (leads table)';
          leadSuccessBanner.style.display = 'flex';
        }
      })
      .catch(function(err) {
        addMsg('model', 'Error: ' + (err.message || 'Network error'));
      })
      .finally(function() {
        hideTyping();
        sendBtn.disabled = false;
      });
    }

    sendBtn.addEventListener('click', function() { sendMessage(chatInput.value); });
    chatInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') sendMessage(chatInput.value);
    });

    renderProperties([]);
  </script>
</body>
</html>
